<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>CTB Analytics — College Basketball Sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0d0f12;
  --surface:   #161920;
  --surface2:  #1e2229;
  --border:    #2a2f38;
  --text:      #e8eaf0;
  --muted:     #9097a3;
  --muted2:    #707784;

  /* CBB accent: rose/pink instead of green — visually distinct from NBA */
  --accent:    #f43f7a;
  --accent-d:  #4a1128;
  --accent-bg: #2a1120;

  /* Blue for card borders / over badge — kept from old CBB */
  --blue:      #3b82f6;
  --blue-d:    #1e3a5f;
  --blue-bg:   #0f1e35;

  --warn:      #f59e0b;
  --danger:    #ef4444;
  --gold:      #d4af37;
  --mono:      'Roboto Mono', monospace;
  --mono-settings: 'zero' 0;
  --sans:      'IBM Plex Sans', sans-serif;
  --r:         8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

/* ── HEADER ── */
header {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}
.header-copy { min-width: 0; flex: 1 1 auto; }
.brand {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 2px;
}
.site-title {
  font-size: 22px;
  font-weight: 600;
  color: #ffffff;
  letter-spacing: -0.3px;
  line-height: 1.1;
}
.site-date {
  font-size: 12px;
  font-style: italic;
  color: #ffffff;
  margin-top: 4px;
}
#updated {
  font-size: 10px;
  font-style: normal;
  color: var(--muted);
  margin-top: 4px;
}
.header-logo {
  flex: 0 0 auto;
  width: 130px;
  height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.header-logo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

/* ── RECORD TRACKERS ── */
.records-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.records-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 16px 0;
}
.records-header-line {
  flex: 1;
  height: 1px;
  background: var(--border);
}
.records-header-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted2);
  white-space: nowrap;
}
.records {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
}
.rec {
  padding: 6px 16px 12px;
  border-right: 1px solid var(--border);
  border-left: 2px solid var(--blue);
}
.rec:first-child { border-left: 2px solid var(--blue); }
.rec:last-child { border-right: none; }
.rec-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #fff;
  margin-bottom: 5px;
  text-align: center;
}
.rec-row {
  display: flex;
  align-items: baseline;
  gap: 4px;
  margin-bottom: 2px;
}
.rec-row-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: #9097a3;
  width: 30px;
  flex-shrink: 0;
}
.rec-row-label.tier-1 { color: #f5c542; }
.rec-row-label.tier-5 { color: #f0a05a; }
.rec-row-label.tier-all { color: #cdd2da; }
.rec-row-val {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  color: #fff;
  flex: 1;
}
.rec-row-val.tier-1 { color: #f5c542; font-size: 10px; }
.rec-row-val.tier-5 { color: #f0a05a; font-size: 10px; }
.rec-row-pct {
  font-family: var(--mono);
  font-size: 10px;
  color: #cdd2da;
}
.rec-row-pct.tier-1 { color: #f5c542; }
.rec-row-pct.tier-5 { color: #f0a05a; }

/* ── TABS ── */
.tabs-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 12px 10px;
}
.tabs {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  flex-wrap: nowrap;
}
.tab {
  padding: 10px 14px;
  min-width: 0;
  flex: 1 1 auto;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface2);
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: 0.15s ease;
  user-select: none;
  text-align: center;
}
.tab:hover { color: var(--text); border-color: #3a404b; }
/* Rose/pink active — immediately different from NBA green */
.tab.active {
  color: #ffffff;
  border-color: var(--accent);
  background: var(--accent-bg);
  box-shadow: inset 0 0 0 1px rgba(244,63,122,0.15);
}
.tab-ct {
  display: inline-block;
  min-width: 22px;
  margin-left: 7px;
  padding: 2px 7px;
  border-radius: 999px;
  background: #2b313b;
  color: #c9d0db;
  font-size: 10px;
  font-family: var(--mono);
  vertical-align: middle;
}
.tab.active .tab-ct {
  background: var(--accent);
  color: #fff;
}

/* ── MAIN / PANELS ── */
main { padding: 14px; }
.panel { display: none; }
.panel.active { display: block; }

/* ── BET BADGES ── */
.badge {
  display: inline-flex;
  align-items: flex-start;
  gap: 6px;
  padding: 5px 8px 5px 7px;
  border-radius: 4px;
  font-family: var(--mono);
  line-height: 1.05;
  white-space: nowrap;
}
.b-over {
  background: #14532d;
  color: #4ade80;
  border: 1px solid #166534;
}
.b-under {
  background: #1e3a5f;
  color: #93c5fd;
  border: 1px solid #1d4ed8;
}
.b-home {
  background: var(--accent-bg);
  color: #fda4c0;
  border: 1px solid #831843;
}
.b-away {
  background: #1a1500;
  color: #fde68a;
  border: 1px solid #78350f;
}
.b-pass {
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
}
.badge-arrow { font-size: 13px; font-weight: 700; line-height: 1; padding-top: 1px; }
.badge-copy { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; }
.badge-main { font-size: 10px; font-weight: 700; letter-spacing: 0.02em; color: #ffffff; }
.badge-sub  { font-size: 8px; opacity: 0.85; line-height: 1; }

/* ── SCORE STYLES ── */
.es { font-family: var(--mono); font-size: 13px; font-weight: 600; font-feature-settings: "zero" 0; }
.ep { color: var(--blue); }
.en { color: #f87171; }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 50px 20px; color: var(--muted); }
.empty .icon { font-size: 28px; margin-bottom: 10px; }

/* ═══════════════════════════════════════════════════
   CBB GAME CARDS — compact, mobile-first
   Each card = one game's pick
═══════════════════════════════════════════════════ */
.game-cards { display: flex; flex-direction: column; gap: 10px; }

.game-card {
  background: var(--surface);
  /* Blue left border — CBB visual signature */
  border: 1px solid var(--border);
  border-left: 3px solid var(--blue);
  border-radius: var(--r);
  overflow: hidden;
}

/* Top strip: matchup + badge */
.gc-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
}
.gc-matchup { min-width: 0; flex: 1; }
.gc-rank {
  font-family: var(--mono);
  font-size: 10px;
  color: #ffffff;
  margin-bottom: 2px;
}
.gc-teams {
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}
.gc-teams .away { color: #ffffff; font-weight: 500; display: block; }
.gc-teams .home-team { display: block; }
.gc-teams .vs   { color: var(--muted2); font-size: 9px; display: block; line-height: 1; margin: 1px 0; }

/* Body: 2-column layout - scores left, models right */
.gc-body {
  display: grid;
  grid-template-columns: 80px 1fr;
  gap: 0;
}

/* Model predictions mini table */
.gc-mkt-row, .gc-pred-row {
  display: flex;
  justify-content: flex-start;
  align-items: center;
  gap: 10px;
  margin-top: 3px;
}
.gc-mkt-lbl, .gc-pred-lbl {
  font-family: var(--mono);
  font-size: 8px;
  color: var(--muted2);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  white-space: nowrap;
  min-width: 0;
  text-align: left;
}
.gc-mkt-val {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  font-feature-settings: "zero" 0;
}
.gc-market-row {
  display: flex;
  align-items: baseline;
  justify-content: flex-start;
  gap: 6px;
  margin-bottom: 2px;
}
.gc-market-lbl {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  color: #ffffff;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.gc-market-val {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--text);
  font-feature-settings: "zero" 0;
}
.gc-market-val.pred-over { color: #4ade80; }
.gc-market-val.pred-under { color: #93c5fd; }
.gc-market-val.sp-agree { color: #4ade80; }
.gc-market-val.sp-disagree { color: #ef4444; }
.b-spread { background: #7c3500; border: 1px solid var(--warn); }
.gc-pred-val { font-family: var(--mono); font-size: 11px; font-weight: 500; font-feature-settings: "zero" 0; }
.gc-pred-val.pred-over { color: #4ade80; }
.gc-pred-val.pred-under { color: #93c5fd; }
.gc-pred-val.sp-agree { color: #4ade80; }
.gc-pred-val.sp-disagree { color: #ef4444; }
.gc-pred-grid {
  display: grid;
  grid-template-columns: repeat(2, max-content);
  gap: 2px 12px;
  margin-top: 4px;
  justify-content: start;
  margin-left: -10px;
}
.gc-pred-cell {
  display: flex;
  align-items: center;
  gap: 6px;
}
.gc-pred-cell .gc-pred-lbl {
  width: 52px;
  text-align: right;
}
.gc-pred-cell .gc-pred-val {
  width: 32px;
  text-align: left;
}
.gc-models-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
}
.gc-cell {
  padding: 6px 8px;
  border-right: 1px solid var(--border);
  min-width: 0;
}
.gc-cell:last-child { border-right: none; }
.gc-cell-label {
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 4px;
  white-space: nowrap;
}
.gc-cell-value {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}
.gc-cell-value.dim { color: var(--muted); font-size: 11px; }

/* AG score color bar */
.ag-bar {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 4px;
}
.ag-bar-track {
  height: 3px;
  border-radius: 2px;
  background: var(--border);
  flex: 1;
  overflow: hidden;
}
.ag-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, #f43f7a, #fb923c);
}

/* Edge score coloring — same logic as NBA */
.es-high  { color: hsl(260, 85%, 72%); font-weight: 700; }
.es-med   { color: hsl(240, 85%, 70%); font-weight: 600; }
.es-low   { color: var(--muted); font-weight: 500; }



/* ── DAY NAV ── */
.day-nav-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 12px 8px;
  display: flex;
  justify-content: center;
  gap: 8px;
}
.day-btn {
  padding: 8px 20px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface2);
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.day-btn:hover { border-color: var(--accent); color: var(--text); }
.day-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.day-btn.tomorrow { border-color: #3b82f6; }
.day-btn.tomorrow.active { background: #3b82f6; border-color: #3b82f6; }

/* ── LINE MOVEMENT ── */
.lm-wrap {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 6px;
}
.lm-label {
  font-size: 8px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted2);
  white-space: nowrap;
}
.lm-bar {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  position: relative;
  overflow: visible;
}
.lm-fill {
  position: absolute;
  top: 0;
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s;
}
.lm-fill.lm-good  { background: #4ade80; }
.lm-fill.lm-bad   { background: #ef4444; }
.lm-fill.lm-none  { background: var(--muted2); }
.lm-val {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  white-space: nowrap;
}
.lm-val.lm-good  { color: #4ade80; }
.lm-val.lm-bad   { color: #ef4444; }
.lm-val.lm-none  { color: var(--muted2); }

/* ── YESTERDAY RESULT ── */
.yest-result {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 0 2px;
}
.yest-checkmark {
  font-size: 22px;
  flex-shrink: 0;
}
.yest-details {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
}
.yest-actual { font-size: 12px; font-weight: 700; color: var(--text); }

/* ── TOMORROW BANNER ── */
.tmr-banner {
  background: #0f1e35;
  border: 1px solid #1e3a5f;
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 10px;
  color: #60a5fa;
  margin-bottom: 8px;
  text-align: center;
}

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  header { padding: 14px 14px 12px; }
  .header-logo { width: 88px; height: 88px; }
  .site-title { font-size: 18px; }
  main { padding: 10px; }
  .records { grid-template-columns: repeat(3, 1fr); }
  .rec { padding: 10px 8px; }
  .rec-val { font-size: 15px; }
  .tab { padding: 9px 8px; font-size: 11px; }
  .gc-body { grid-template-columns: 80px 1fr; }
  .gc-cell { padding: 7px 7px; }
  .gc-cell-value { font-size: 11px; }
  .gc-mkt-val { font-size: 12px; }
}

@media (max-width: 420px) {
  .gc-body { grid-template-columns: 72px 1fr; }
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-copy">
      <div class="brand">CTB Analytics</div>
      <div class="site-title">College Basketball Sheet</div>
      <div class="site-date" id="run-date">—</div>
      <div id="updated"></div>
    </div>
    <div class="header-logo">
      <img src="assets/ctb-logo.png" alt="CTB Analytics Logo">
    </div>
  </div>
</header>

<!-- Day navigation -->
<div class="day-nav-wrap">
  <button class="day-btn" id="btn-yesterday" onclick="switchDay('yesterday')">Yesterday</button>
  <button class="day-btn active" id="btn-today" onclick="switchDay('today')">Today</button>
  <button class="day-btn tomorrow" id="btn-tomorrow" onclick="switchDay('tomorrow')">Tomorrow</button>
</div>

<!-- Record trackers: Game Totals | Team Totals | Spreads -->
<div class="records-wrap">
  <div class="records-header">
    <div class="records-header-line"></div>
    <div class="records-header-label">Records</div>
    <div class="records-header-line"></div>
  </div>
  <div class="records">
    <div class="rec">
      <div class="rec-label">Game Totals</div>
      <div class="rec-row">
        <span class="rec-row-label tier-1">Top 1</span>
        <span class="rec-row-val tier-1" id="r-gt-top1">—</span>
        <span class="rec-row-pct tier-1" id="r-gt-top1-pct">—</span>
      </div>
      <div class="rec-row">
        <span class="rec-row-label tier-5">Top 5</span>
        <span class="rec-row-val tier-5" id="r-gt-top5">—</span>
        <span class="rec-row-pct tier-5" id="r-gt-top5-pct">—</span>
      </div>
      <div class="rec-row">
        <span class="rec-row-label tier-all">All</span>
        <span class="rec-row-val" id="r-gt-all">—</span>
        <span class="rec-row-pct" id="r-gt-all-pct">—</span>
      </div>
    </div>
    <div class="rec">
      <div class="rec-label">Team Totals</div>
      <div class="rec-row">
        <span class="rec-row-label tier-1">Top 1</span>
        <span class="rec-row-val tier-1" id="r-tt-top1">—</span>
        <span class="rec-row-pct tier-1" id="r-tt-top1-pct">—</span>
      </div>
      <div class="rec-row">
        <span class="rec-row-label tier-5">Top 5</span>
        <span class="rec-row-val tier-5" id="r-tt-top5">—</span>
        <span class="rec-row-pct tier-5" id="r-tt-top5-pct">—</span>
      </div>
      <div class="rec-row">
        <span class="rec-row-label tier-all">All</span>
        <span class="rec-row-val" id="r-tt-all">—</span>
        <span class="rec-row-pct" id="r-tt-all-pct">—</span>
      </div>
    </div>
    <div class="rec">
      <div class="rec-label">Spreads</div>
      <div class="rec-row">
        <span class="rec-row-label tier-1">Top 1</span>
        <span class="rec-row-val tier-1" id="r-sp-top1">—</span>
        <span class="rec-row-pct tier-1" id="r-sp-top1-pct">—</span>
      </div>
      <div class="rec-row">
        <span class="rec-row-label tier-5">Top 5</span>
        <span class="rec-row-val tier-5" id="r-sp-top5">—</span>
        <span class="rec-row-pct tier-5" id="r-sp-top5-pct">—</span>
      </div>
      <div class="rec-row">
        <span class="rec-row-label tier-all">All</span>
        <span class="rec-row-val" id="r-sp-all">—</span>
        <span class="rec-row-pct" id="r-sp-all-pct">—</span>
      </div>
    </div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs-wrap">
  <div class="tabs">
    <div class="tab active" data-tab="gt">Game Totals <span class="tab-ct" id="ct-gt">0</span></div>
    <div class="tab" data-tab="tt">Team Totals <span class="tab-ct" id="ct-tt">0</span></div>
    <div class="tab" data-tab="sp">Spreads <span class="tab-ct" id="ct-sp">0</span></div>
  </div>
</div>

<main>
  <div class="panel active" id="panel-gt"></div>
  <div class="panel" id="panel-tt"></div>
  <div class="panel" id="panel-sp"></div>
</main>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const GITHUB_USER = 'CameronBroussard6';
const GITHUB_REPO = 'cbb-site';
const BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main`;

// Tabs and their CSV file prefixes / display labels
const TABS = {
  gt: { label: 'Game Totals',  todayFile: 'game_totals_today',  tmrFile: 'game_totals_tomorrow',  histFile: 'game_totals_history',  resultCol: 'bet_result'  },
  tt: { label: 'Team Totals',  todayFile: 'team_totals_today',  tmrFile: 'team_totals_tomorrow',  histFile: 'team_totals_history',  resultCol: 'bet_result'  },
  sp: { label: 'Spreads',      todayFile: 'spreads_today',      tmrFile: 'spreads_tomorrow',      histFile: 'spreads_history',      resultCol: 'pick_result' },
};

// Current day view: 'yesterday' | 'today' | 'tomorrow'
let currentDay = 'today';
// Cached history rows for yesterday grading
let historyCache = {};
// Cached odds history for line movement
let oddsHistCache = null;

const MODEL_COLS = {
  gt: ['ridge_pred_total', 'recency_pred_total', 'from_team_pred_total', 'ensemble_pred_total', 'elo_sim_pred_total', 'xgb_elo_pred_total'],
  tt: ['pred_team_total', 'recency_team_pred', 'elo_sim_team_pred'],
  sp: ['model_spread_str'],
};

// ── UTILS ──────────────────────────────────────────────────────────────────
// Always use Central time — pipeline runs on Central schedule
function todayCentral() {
  return new Intl.DateTimeFormat('en-CA', { timeZone: 'America/Chicago' }).format(new Date());
}
// Try today, yesterday, tomorrow in Central time so data is found regardless of load time
function candidateDates() {
  const ms = now => now.getTime();
  const now = new Date();
  const fmtC = d => new Intl.DateTimeFormat('en-CA', { timeZone: 'America/Chicago' }).format(d);
  const t = ms(now);
  return [fmtC(new Date(t)), fmtC(new Date(t - 86400000)), fmtC(new Date(t + 86400000))];
}

function ordinal(n) {
  const s = ['th','st','nd','rd'], v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

function fmtDateOrdinal(str) {
  if (!str) return '—';
  const d = new Date(str + 'T12:00:00');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${ordinal(d.getDate())} ${d.getFullYear()}`;
}

function fmtLastRun(isoStr) {
  if (!isoStr) return 'Last Run: —';
  const d = new Date(isoStr);
  if (isNaN(d.getTime())) return 'Last Run: —';
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/Chicago',
    month: 'long', day: 'numeric', year: 'numeric',
    hour: 'numeric', minute: '2-digit', hour12: true
  }).formatToParts(d);
  const get = t => parts.find(p => p.type === t)?.value || '';
  const day = Number(get('day'));
  return `Last Run: ${get('month')} ${ordinal(day)} ${get('year')} ${get('hour')}:${get('minute')} ${(get('dayPeriod')||'').toLowerCase()} Central`;
}

async function fetchCSV(url) {
  try {
    const r = await fetch(url + '?t=' + Date.now());
    if (!r.ok) { console.warn(`CSV 404: ${url}`); return null; }
    return parseCSV(await r.text());
  } catch(e) { console.warn(`CSV error: ${url}`, e); return null; }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; continue; }
      if (line[i] === ',' && !inQ) { vals.push(cur); cur = ''; continue; }
      cur += line[i];
    }
    vals.push(cur);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i]||'').trim());
    return obj;
  });
}

function fmt(v, d=1) {
  const n = parseFloat(v);
  if (isNaN(n)) return '—';
  const s = n.toFixed(d);
  // strip trailing .0 but keep .5
  return s.endsWith('.0') ? String(Math.round(n)) : s;
}

function fmtRec(w, l) { return (w+l===0) ? '—' : `${w}/${w+l}`; }
function pct(w, l)     { return (w+l===0) ? '—' : `${Math.round(w/(w+l)*100)}%`; }

// ── AG SCORE ───────────────────────────────────────────────────────────────
// Computed from model prediction columns vs the market line and bet direction
// For game totals: count how many model preds agree with bet direction (OVER/UNDER)
// For spreads: how many models agree with the spread pick
function computeAGScore(row, tabKey) {
  const bet = (row.bet || row.pick || '').toUpperCase();
  if (!bet || bet === '' || bet === 'PASS') return null;

  const cols = MODEL_COLS[tabKey] || [];
  if (cols.length === 0) return null;

  let market, agrees = 0, total = 0;

  if (tabKey === 'gt' || tabKey === 'tt') {
    market = parseFloat(row.market_total || row.market_team_total || 0);
    if (isNaN(market)) return null;
    cols.forEach(col => {
      const pred = parseFloat(row[col]);
      if (isNaN(pred)) return;
      total++;
      const predSide = pred > market ? 'OVER' : 'UNDER';
      if (predSide === bet) agrees++;
    });
  } else if (tabKey === 'sp') {
    // Pick direction: positive edge_blend = home favored by model
    const blendMargin = parseFloat(row.pred_margin_blend || 0);
    const pickIsHome = blendMargin > 0;
    const margins = [row.pred_margin_04, row.pred_margin_09, row.pred_margin_10];
    margins.forEach(m => {
      const v = parseFloat(m);
      if (isNaN(v)) return;
      total++;
      const modelPicksHome = v > 0;
      if (modelPicksHome === pickIsHome) agrees++;
    });
  }

  return total === 0 ? null : agrees / total;
}

function agScoreStyle(score) {
  if (score === null || isNaN(score)) return 'color:#707784;font-weight:500;';
  const hue = score * 120; // 0=red, 120=green
  return `color:hsl(${hue},55%,62%);font-weight:700;`;
}

function agScoreDisplay(score) {
  if (score === null || isNaN(score)) return '—';
  return `${Math.round(score * 100)}%`;
}

function agBarFill(score) {
  if (score === null || isNaN(score)) return 0;
  return Math.round(score * 100);
}

// ── EDGE SCORE STYLE ───────────────────────────────────────────────────────
function edgeScoreClass(score) {
  const n = parseFloat(score);
  if (isNaN(n)) return '';
  if (n >= 8) return 'es-high';
  if (n >= 4) return 'es-med';
  return 'es-low';
}

// ── BET BADGE ──────────────────────────────────────────────────────────────
function betBadge(row, tabKey) {
  const raw = (row.bet || row.pick || '').toUpperCase();

  if (tabKey === 'gt' || tabKey === 'tt') {
    const line = fmt(row.market_total || row.market_team_total, 1);
    if (raw === 'OVER') return `<span class="badge b-spread"><span class="badge-arrow">↑</span><span class="badge-copy"><span class="badge-main"><strong>Over</strong> ${line}</span></span></span>`;
    if (raw === 'UNDER') return `<span class="badge b-spread"><span class="badge-arrow">↓</span><span class="badge-copy"><span class="badge-main"><strong>Under</strong> ${line}</span></span></span>`;
  }

  if (tabKey === 'sp') {
    const pick = row.pick || row.bet || '';
    // Extract spread number from end e.g. "Mercyhurst Lakers -4.5" -> -4.5
    const spreadMatch = pick.match(/([+-]?\d+\.?\d*)$/);
    const spreadNum = spreadMatch ? parseFloat(spreadMatch[1]) : NaN;
    // minus = green (favorite = b-over), plus = blue (underdog = b-under)
    const isMinus = !isNaN(spreadNum) && spreadNum < 0;
    const cls = isMinus ? 'b-over' : 'b-under';
    const teamWords = pick.replace(/[+-]?\d+\.?\d*$/, '').trim().split(' ');
    const shortTeam = teamWords.slice(0, 2).join(' ').trim();
    // Format line cleanly — no double sign
    const absNum = isNaN(spreadNum) ? '' : Math.abs(spreadNum) % 1 === 0 ? Math.abs(spreadNum).toFixed(0) : Math.abs(spreadNum).toFixed(1);
    const lineStr = isNaN(spreadNum) ? pick : (isMinus ? '-' : '+') + absNum;
    return `<span class="badge b-spread"><span class="badge-copy"><span class="badge-main">${shortTeam} ${lineStr}</span></span></span>`;
  }

  return `<span class="badge b-pass">PASS</span>`;
}

// ── RECORD COMPUTATION ─────────────────────────────────────────────────────
function computeRecord(rows, resultCol, topN = null) {
  if (!rows || !rows.length) return { w: 0, l: 0, p: 0 };
  let eligible = rows;
  if (topN) {
    // Group by date, take top-N brain_score per day, then flatten
    const byDate = {};
    rows.forEach(r => {
      const d = r.date || 'unknown';
      if (!byDate[d]) byDate[d] = [];
      byDate[d].push(r);
    });
    eligible = [];
    Object.values(byDate).forEach(dayRows => {
      const sorted = dayRows.slice().sort((a,b) => parseFloat(b.brain_score||0) - parseFloat(a.brain_score||0));
      eligible.push(...sorted.slice(0, topN));
    });
  }
  let w=0, l=0, p=0;
  eligible.forEach(r => {
    const res = (r[resultCol]||'').toUpperCase();
    if (res==='W') w++;
    else if (res==='L') l++;
    else if (res==='P') p++;
  });
  return { w, l, p };
}

async function loadRecords() {
  const configs = [
    { id: 'gt', histFile: 'game_totals_history', resultCol: 'bet_result' },
    { id: 'tt', histFile: 'team_totals_history',  resultCol: 'bet_result' },
    { id: 'sp', histFile: 'spreads_history',       resultCol: 'pick_result' },
  ];

  for (const cfg of configs) {
    const rows = await fetchCSV(`${BASE}/data/${cfg.histFile}.csv`);
    if (!rows || !rows.length) continue;

    const all  = computeRecord(rows, cfg.resultCol);
    const top5 = computeRecord(rows, cfg.resultCol, 5);
    const top1 = computeRecord(rows, cfg.resultCol, 1);
    const id   = cfg.id;

    document.getElementById(`r-${id}-all`).textContent      = fmtRec(all.w, all.l);
    document.getElementById(`r-${id}-all-pct`).textContent  = pct(all.w, all.l);
    document.getElementById(`r-${id}-top5`).textContent     = fmtRec(top5.w, top5.l);
    document.getElementById(`r-${id}-top5-pct`).textContent = pct(top5.w, top5.l);
    document.getElementById(`r-${id}-top1`).textContent     = fmtRec(top1.w, top1.l);
    document.getElementById(`r-${id}-top1-pct`).textContent = pct(top1.w, top1.l);
  }
}

// ── CARD BUILDER ───────────────────────────────────────────────────────────
function buildCards(rows, tabKey, day='today') {
  if (!rows || !rows.length) {
    const label = TABS[tabKey]?.label || tabKey;
    return `<div class="empty"><div class="icon">🏀</div><p>No ${label} picks.</p></div>`;
  }

  const isTBD = t => !t || t.trim() === '' || t.trim().toUpperCase() === 'TBD' || t.trim().toUpperCase() === 'NA';
  const valid = rows.filter(r => {
    if (tabKey === 'tt') return !isTBD(r.team_name);
    return !isTBD(r.away_team) && !isTBD(r.home_team);
  });
  const sorted = valid.slice().sort((a,b) => parseFloat(b.brain_score||0) - parseFloat(a.brain_score||0));

  const tmrBanner = day === 'tomorrow' ? `<div class="tmr-banner">🔭 Preview — lines and picks will update as tomorrow's odds are posted</div>` : '';
  return `${tmrBanner}<div class="game-cards">${sorted.map((r, i) => buildCard(r, i, tabKey, day)).join('')}</div>`;
}

function buildCard(r, rank, tabKey, day='today') {
  const ag = computeAGScore(r, tabKey);
  const agPct = agBarFill(ag);
  const edgeClass = edgeScoreClass(r.brain_score);
  const badge = betBadge(r, tabKey);

  // Matchup line
  const away = r.away_team || '?';
  const home = r.home_team || r.team_name || '?';

  // For spreads: derive per-team lines directly from pick column
  let spAwayLine = '', spHomeLine = '';
  if (tabKey === 'sp') {
    const pickLineRaw = (r.pick||'').match(/([+-]?\d+\.?\d*)$/);
    if (pickLineRaw) {
      const pickNum = parseFloat(pickLineRaw[1]);
      const absP = Math.abs(pickNum);
      const absStr = absP % 1 === 0 ? absP.toFixed(0) : absP.toFixed(1);
      const pickLineStr = (pickNum < 0 ? '-' : '+') + absStr;
      const otherLineStr = (pickNum < 0 ? '+' : '-') + absStr;
      // which team is the pick?
      const pickStr = (r.pick||'').replace(/[+-]?\d+\.?\d*$/, '').trim().toLowerCase();
      const pickIsHomeH = pickStr.includes(home.split(' ')[0].toLowerCase());
      spHomeLine = pickIsHomeH ? pickLineStr : otherLineStr;
      spAwayLine = pickIsHomeH ? otherLineStr : pickLineStr;
    }
  }
  const haStr = r.homeAway==='home' ? 'Home' : 'Away';
  const matchup = tabKey === 'tt'
    ? `<span class="away">${home} <span style="font-size:9px;font-weight:400;color:var(--muted);">(${haStr})</span></span>`
    : tabKey === 'sp'
    ? `<span class="away">${away} <span style="font-size:9px;color:var(--warn);">${spAwayLine}</span></span><span class="vs">@</span><span class="home-team">${home} <span style="font-size:9px;color:var(--warn);">${spHomeLine}</span></span>`
    : `<span class="away">${away}</span><span class="vs">@</span><span class="home-team">${home}</span>`;

  // Market + model lines
  let marketLine = '—', edgePts = '—';
  let modelPredRows = ''; // individual model prediction rows

  if (tabKey === 'gt') {
    marketLine = fmt(r.market_total, 1);
    const mkt = parseFloat(r.market_total);
    const betIsOver = (r.bet||'').toUpperCase() === 'OVER';
    const pc = v => {
      const n = parseFloat(v);
      if (isNaN(n)||isNaN(mkt)) return '';
      const modelOver = n >= mkt;
      return (modelOver === betIsOver) ? 'sp-agree' : 'sp-disagree';
    };
    const ridge    = fmt(r.ridge_pred_total, 1);
    const recency  = fmt(r.recency_pred_total, 1);
    const teamFoc  = fmt(r.from_team_pred_total, 1);
    const ensemble = fmt(r.ensemble_pred_total, 1);
    const eloSim   = fmt(r.elo_sim_pred_total, 1);
    const xgbElo   = fmt(r.xgb_elo_pred_total, 1);
    modelPredRows = `
      <div class="gc-pred-grid">
        <div class="gc-pred-cell"><span class="gc-pred-lbl">RIDGE</span><span class="gc-pred-val ${pc(r.ridge_pred_total)}">${ridge}</span></div>
        <div class="gc-pred-cell"><span class="gc-pred-lbl">RECENCY</span><span class="gc-pred-val ${pc(r.recency_pred_total)}">${recency}</span></div>
        <div class="gc-pred-cell"><span class="gc-pred-lbl">TEAM</span><span class="gc-pred-val ${pc(r.from_team_pred_total)}">${teamFoc}</span></div>
        <div class="gc-pred-cell"><span class="gc-pred-lbl">ENSEMBLE</span><span class="gc-pred-val ${pc(r.ensemble_pred_total)}">${ensemble}</span></div>
        <div class="gc-pred-cell"><span class="gc-pred-lbl">SIM</span><span class="gc-pred-val ${pc(r.elo_sim_pred_total)}">${eloSim}</span></div>
        <div class="gc-pred-cell"><span class="gc-pred-lbl">XGB</span><span class="gc-pred-val ${pc(r.xgb_elo_pred_total)}">${xgbElo}</span></div>
      </div>`;
    const diff = parseFloat(r.ensemble_pred_total) - mkt;
    edgePts = isNaN(diff) ? '—' : (diff >= 0 ? '+' : '') + diff.toFixed(1);
  } else if (tabKey === 'tt') {
    marketLine = fmt(r.market_team_total, 1);
    const mkt = parseFloat(r.market_team_total);
    const betIsOverTT = (r.bet||'').toUpperCase() === 'OVER';
    const pc = v => {
      const n = parseFloat(v);
      if (isNaN(n)||isNaN(mkt)) return '';
      const modelOver = n >= mkt;
      return (modelOver === betIsOverTT) ? 'sp-agree' : 'sp-disagree';
    };
    const predRidge   = fmt(r.pred_team_total, 1);
    const predRecency = fmt(r.recency_team_pred, 1);
    const predSim     = fmt(r.elo_sim_team_pred, 1);
    modelPredRows = `
      <div style="display:inline-flex;flex-direction:column;gap:2px;align-items:stretch;">
        <div style="display:flex;gap:6px;align-items:baseline;"><span style="font-family:var(--mono);font-size:8px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.05em;min-width:52px;text-align:right;">RIDGE</span><span class="gc-market-val ${pc(r.pred_team_total)}">${predRidge}</span></div>
        <div style="display:flex;gap:6px;align-items:baseline;"><span style="font-family:var(--mono);font-size:8px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.05em;min-width:52px;text-align:right;">RECENCY</span><span class="gc-market-val ${pc(r.recency_team_pred)}">${predRecency}</span></div>
        <div style="display:flex;gap:6px;align-items:baseline;"><span style="font-family:var(--mono);font-size:8px;color:var(--muted2);text-transform:uppercase;letter-spacing:0.05em;min-width:52px;text-align:right;">SIM</span><span class="gc-market-val ${pc(r.elo_sim_team_pred)}">${predSim}</span></div>
      </div>`;
    const diff = parseFloat(r.pred_team_total) - mkt;
    edgePts = isNaN(diff) ? '—' : (diff >= 0 ? '+' : '') + diff.toFixed(1);
  } else if (tabKey === 'sp') {
    // Strip mascot from market spread string for display
    // Always show the minus side for market line
    // Market line: show from pick team's perspective using actual pick column
    {
      const pickTeam = (r.pick || '').replace(/[+-]?\d+\.?\d*$/, '').trim();
      const pickLineM = (r.pick || '').match(/([+-]?\d+\.?\d*)$/);
      const pickLineNum = pickLineM ? parseFloat(pickLineM[1]) : NaN;
      if (pickTeam && !isNaN(pickLineNum)) {
        const shortPick = pickTeam.split(' ').slice(0,2).join(' ');
        const absL = Math.abs(pickLineNum);
        const absStr = absL % 1 === 0 ? absL.toFixed(0) : absL.toFixed(1);
        const lineStr = pickLineNum < 0 ? '-' + absStr : '+' + absStr;
        marketLine = shortPick + ' ' + lineStr;
      } else {
        marketLine = r.market_spread_str || '—';
      }
    }

    // Build model spread lines from raw margins
    const mktSpread = parseFloat(r.market_spread_home || r.edge_blend || 0);
    // Identify pick team (home or away)
    const pickTeamStr = (r.pick||'').replace(/[+-]?\d+\.?\d*$/, '').trim().toLowerCase();
    const pickIsHomeTeam = pickTeamStr.includes((r.home_team||'').split(' ')[0].toLowerCase());
    const pickTeamFull = pickIsHomeTeam ? (r.home_team||'') : (r.away_team||'');
    const shortPickTeam = pickTeamFull.split(' ').slice(0,2).join(' ');

    const fmtSpreadLine = (margin) => {
      if (isNaN(parseFloat(margin))) return '<span class="gc-market-val">—</span>';
      const m = parseFloat(margin);
      // pred_margin = home team margin. Positive = home wins by m, negative = away wins by abs(m)
      // Convert to pick team's implied line:
      // if pick team is home: their margin = m, so line = -m (they're favored if m>0)
      // if pick team is away: their margin = -m, so line = m (they're favored if m<0)
      const pickMargin = pickIsHomeTeam ? m : -m;
      // pickMargin > 0 means pick team wins = they are the favorite = minus line
      const absVal = Math.abs(pickMargin) % 1 === 0 ? Math.abs(pickMargin).toFixed(0) : Math.abs(pickMargin).toFixed(1);
      // Always show from model-projected winner's perspective
      const otherTeamFull = pickIsHomeTeam ? (r.away_team||'') : (r.home_team||'');
      const shortOtherTeam = otherTeamFull.split(' ').slice(0,2).join(' ');
      let lineStr;
      if (pickMargin >= 0) {
        // model says pick team wins — show pick team minus
        lineStr = shortPickTeam + ' -' + absVal;
      } else {
        // model says other team wins — show other team with minus line
        lineStr = shortOtherTeam + ' -' + absVal;
      }
      // Agree if model also picks our team (same sign as pick line)
      const pickLineMatch2 = (r.pick||'').match(/([+-]?\d+\.?\d*)$/);
      const pickLineNum2 = pickLineMatch2 ? parseFloat(pickLineMatch2[1]) : NaN;
      const pickIsMinus2 = !isNaN(pickLineNum2) && pickLineNum2 < 0;
      const marketAbs = Math.abs(pickLineNum2); // e.g. 2.5 for -2.5 or +2.5
      // Agree = model projects pick team covers the spread:
      // if pick is minus (fav): pickMargin must exceed marketAbs (win by more than spread)
      // if pick is plus (dog):  pickMargin must be > -marketAbs (lose by less than spread, or win)
      const modelAgreesWithPick = pickIsMinus2
        ? (pickMargin > marketAbs)
        : (pickMargin > -marketAbs);
      const cls = modelAgreesWithPick ? 'sp-agree' : 'sp-disagree';
      return `<span class="gc-market-val ${cls}">${lineStr}</span>`;
    };
    modelPredRows = `
      <div style="display:inline-flex;flex-direction:column;gap:2px;align-items:stretch;">
        <div style="display:flex;gap:6px;align-items:baseline;"><span style="font-family:var(--mono);font-size:8px;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;min-width:62px;text-align:right;">XGB</span>${fmtSpreadLine(r.pred_margin_04)}</div>
        <div style="display:flex;gap:6px;align-items:baseline;"><span style="font-family:var(--mono);font-size:8px;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;min-width:62px;text-align:right;">ELO</span>${fmtSpreadLine(r.pred_margin_09)}</div>
        <div style="display:flex;gap:6px;align-items:baseline;"><span style="font-family:var(--mono);font-size:8px;color:#6b7280;text-transform:uppercase;letter-spacing:0.05em;min-width:62px;text-align:right;">AdjForm</span>${fmtSpreadLine(r.pred_margin_10)}</div>
      </div>`;
    edgePts = r.edge_pts ? (parseFloat(r.edge_pts) >= 0 ? '+' : '') + fmt(r.edge_pts, 1) : '—';
  }

  const edgePtClass = edgePts.startsWith('+') ? 'ep' : edgePts.startsWith('-') ? 'en' : '';

  // Compute consensus from model cols
  let overCount = 0, underCount = 0;
  if (tabKey === 'gt') {
    const mkt = parseFloat(r.market_total);
    MODEL_COLS.gt.forEach(col => {
      const n = parseFloat(r[col]);
      if (!isNaN(n) && !isNaN(mkt)) { n >= mkt ? overCount++ : underCount++; }
    });
  } else if (tabKey === 'tt') {
    const mkt = parseFloat(r.market_team_total);
    ['pred_team_total','recency_team_pred','elo_sim_team_pred'].forEach(col => {
      const n = parseFloat(r[col]);
      if (!isNaN(n) && !isNaN(mkt)) { n >= mkt ? overCount++ : underCount++; }
    });
  }
  const totalVotes = overCount + underCount;
  const overPct = totalVotes > 0 ? Math.round(overCount / totalVotes * 100) : 50;
  const dominantSide = overCount >= underCount ? 'OVER' : 'UNDR';
  const dominantPct = overCount >= underCount ? overPct : 100 - overPct;
  const consensusColor = overCount >= underCount ? '#4ade80' : '#93c5fd';
  const consensusHtml = tabKey === 'sp' ? '' : `
    <div class="gc-consensus">
      <div class="gc-consensus-label">Split</div>
      <div class="gc-consensus-track">
        <div class="gc-consensus-fill" style="height:${overPct}%;background:#166534;"></div>
      </div>
      <div class="gc-consensus-pct" style="color:${consensusColor}">${dominantPct}%</div>
      <div class="gc-consensus-side" style="color:${consensusColor}">${dominantSide}</div>
    </div>`;

  // Line movement (today/tomorrow only)
  const lineMoveHtml = (day === 'today' || day === 'tomorrow')
    ? buildLineMoveHtml(r.game_id, tabKey, oddsHistCache)
    : '';

  // Yesterday result overlay
  const yestHtml = day === 'yesterday'
    ? buildYestResult(r, tabKey, historyCache[tabKey])
    : '';

  return `
<div class="game-card">
  <div class="gc-head">
    <div class="gc-matchup">
      <div class="gc-rank" style="color:${rank===0 ? '#f5c542' : rank<5 ? '#f0a05a' : '#ffffff'};font-weight:${rank<5?'700':'500'}">#${rank+1}</div>
      <div class="gc-teams">${matchup}</div>
    </div>
    <div>${badge}</div>
  </div>
  <div class="gc-body">
    <div class="gc-cell">
      <div class="gc-cell-label">Edge Score</div>
      <div class="gc-cell-value es ${edgeClass}">${fmt(r.brain_score, 1)}</div>
      <div style="margin-top:8px;">
        <div class="gc-cell-label" style="margin-bottom:2px;">AG Score</div>
        <div class="gc-cell-value es" style="${agScoreStyle(ag)}">${agScoreDisplay(ag)}</div>
        <div class="ag-bar"><div class="ag-bar-track"><div class="ag-bar-fill" style="width:${agPct}%"></div></div></div>
      ${lineMoveHtml}
      ${yestHtml}
      </div>
    </div>
    <div class="gc-cell" style="display:flex;align-items:center;justify-content:center;">
      <div class="gc-models-wrap">
        <div class="gc-market-row"><span class="gc-market-lbl">MARKET</span><span class="gc-market-val">${marketLine}</span></div>
        ${modelPredRows}
      </div>
    </div>
  </div>
</div>`;
}

// ── LINE MOVEMENT DISPLAY ─────────────────────────────────────────────────
async function loadOddsHistory(dateStr) {
  if (oddsHistCache) return oddsHistCache;
  const rows = await fetchCSV(`${BASE}/data/odds_history_${dateStr}.csv`);
  oddsHistCache = rows || [];
  return oddsHistCache;
}

function buildLineMoveHtml(gameId, tabKey, oddsHist) {
  if (!oddsHist || oddsHist.length === 0) return '';
  const gameRows = oddsHist.filter(r => r.game_id === gameId);
  if (gameRows.length < 2) return '';

  const sorted = gameRows.slice().sort((a,b) => a.run_time > b.run_time ? 1 : -1);
  const first = sorted[0];
  const last  = sorted[sorted.length - 1];

  let move, moveLabel, isFav;
  if (tabKey === 'sp') {
    const firstV = parseFloat(first.market_spread_home);
    const lastV  = parseFloat(last.market_spread_home);
    if (isNaN(firstV) || isNaN(lastV)) return '';
    move = lastV - firstV;
    moveLabel = move === 0 ? 'Flat' : (move > 0 ? '+' : '') + move.toFixed(1) + ' spread';
  } else {
    const firstV = parseFloat(first.market_total);
    const lastV  = parseFloat(last.market_total);
    if (isNaN(firstV) || isNaN(lastV)) return '';
    move = lastV - firstV;
    moveLabel = move === 0 ? 'Flat' : (move > 0 ? '+' : '') + move.toFixed(1) + ' O/U';
  }

  const absMv = Math.abs(move);
  const barPct = Math.min(absMv / 3 * 100, 100); // 3pt = full bar
  const cls = move === 0 ? 'lm-none' : (absMv > 0 ? 'lm-good' : 'lm-bad');
  // Actually good/bad depends on bet direction — just show magnitude + direction for now
  const dirCls = move === 0 ? 'lm-none' : move > 0 ? 'lm-good' : 'lm-bad';

  return `<div class="lm-wrap">
    <div class="lm-label">Line</div>
    <div class="lm-bar"><div class="lm-fill ${dirCls}" style="width:${barPct}%;${move < 0 ? 'right:0;left:auto;' : 'left:0;'}"></div></div>
    <div class="lm-val ${dirCls}">${moveLabel}</div>
  </div>`;
}

// ── YESTERDAY RESULT DISPLAY ─────────────────────────────────────────────
function buildYestResult(r, tabKey, histRows) {
  if (!histRows || !histRows.length) return '';
  const match = histRows.find(h => h.game_id === r.game_id);
  if (!match) return '';

  const resultCol = TABS[tabKey].resultCol;
  const result = (match[resultCol] || '').toUpperCase();
  if (!result || result === '') return '';

  const actualTotal = parseFloat(match.actual_total);
  const actualMargin = parseFloat(match.actual_margin || match.home_score) - parseFloat(match.away_score || 0);

  let checkmark = '', detailHtml = '';
  if (result === 'W') {
    checkmark = '<span class="yest-checkmark" style="color:#4ade80;">✓</span>';
  } else if (result === 'L') {
    checkmark = '<span class="yest-checkmark" style="color:#ef4444;">✗</span>';
  } else if (result === 'P') {
    checkmark = '<span class="yest-checkmark" style="color:#f59e0b;">~</span>';
  }

  if (tabKey === 'gt' && !isNaN(actualTotal)) {
    const bet = (r.bet || '').toUpperCase();
    detailHtml = `<div class="yest-details">Actual: <span class="yest-actual">${actualTotal}</span> · Bet: ${bet} ${fmt(r.market_total,1)}</div>`;
  } else if (tabKey === 'sp') {
    const hs = parseFloat(match.home_score), as_ = parseFloat(match.away_score);
    if (!isNaN(hs) && !isNaN(as_)) {
      const margin = hs - as_;
      detailHtml = `<div class="yest-details">Final: <span class="yest-actual">${as_} - ${hs}</span> (margin ${margin > 0 ? '+' : ''}${margin.toFixed(0)})</div>`;
    }
  } else if (tabKey === 'tt' && !isNaN(actualTotal)) {
    detailHtml = `<div class="yest-details">Actual: <span class="yest-actual">${actualTotal}</span></div>`;
  }

  return `<div class="yest-result">${checkmark}<div>${detailHtml}</div></div>`;
}

// ── INIT ───────────────────────────────────────────────────────────────────
async function init() {
  const dates = candidateDates(); // [today, yesterday, tomorrow] in Central
  document.getElementById('run-date').textContent = fmtDateOrdinal(dates[0]);

  const meta = await fetch(`${BASE}/meta.json?t=` + Date.now())
    .then(r => r.ok ? r.json() : null).catch(() => null);
  if (meta && meta.run_timestamp) {
    const el = document.getElementById('updated');
    if (el) el.textContent = fmtLastRun(meta.run_timestamp);
  }

  // Pre-load history for yesterday grading
  for (const [tabKey, cfg] of Object.entries(TABS)) {
    const rows = await fetchCSV(`${BASE}/data/${cfg.histFile}.csv`);
    historyCache[tabKey] = rows || [];
  }

  // Pre-load odds history for line movement
  oddsHistCache = await fetchCSV(`${BASE}/data/odds_history_${dates[0]}.csv`) || [];

  await loadDay('today');
  loadRecords();
}

async function loadDay(day) {
  currentDay = day;
  const dates = candidateDates(); // [today, yesterday, tomorrow]
  const dateStr = day === 'today' ? dates[0] : day === 'yesterday' ? dates[1] : dates[2];

  // Update day button styles
  ['yesterday','today','tomorrow'].forEach(d => {
    const btn = document.getElementById(`btn-${d}`);
    if (btn) btn.classList.toggle('active', d === day);
  });

  // Update header date
  document.getElementById('run-date').textContent = fmtDateOrdinal(dateStr);

  for (const [tabKey, cfg] of Object.entries(TABS)) {
    const panel = document.getElementById(`panel-${tabKey}`);
    panel.innerHTML = `<div class="empty"><div class="icon">⟳</div><p>Loading…</p></div>`;

    let rows = null;
    if (day === 'today') {
      rows = await fetchCSV(`${BASE}/data/${cfg.todayFile}.csv`);
    } else if (day === 'tomorrow') {
      rows = await fetchCSV(`${BASE}/data/${cfg.tmrFile}.csv`);
    } else {
      // Yesterday: find in history by date
      const hist = historyCache[tabKey] || [];
      rows = hist.filter(r => r.date === dateStr);
    }

    if (rows && rows.length) {
      document.getElementById(`ct-${tabKey}`).textContent = String(rows.length);
      panel.innerHTML = buildCards(rows, tabKey, day);
    } else {
      document.getElementById(`ct-${tabKey}`).textContent = '0';
      let msg = day === 'tomorrow' ? `Tomorrow's picks will appear as games are confirmed.` : `No ${cfg.label} data for ${dateStr}.`;
      panel.innerHTML = `<div class="empty"><div class="icon">${day === 'tomorrow' ? '🔭' : '📭'}</div><p>${msg}</p></div>`;
    }
  }
}

async function switchDay(day) {
  await loadDay(day);
}

// ── TAB SWITCHING ──────────────────────────────────────────────────────────
function switchTab(key) {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
  const btn = document.querySelector(`.tab[data-tab="${key}"]`);
  const panel = document.getElementById(`panel-${key}`);
  if (btn) btn.classList.add('active');
  if (panel) panel.classList.add('active');
  history.replaceState(null, '', '#' + key);
}
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => switchTab(t.dataset.tab));
});
// Restore tab from hash on load
const hashTab = window.location.hash.replace('#','');
if (hashTab && document.querySelector(`.tab[data-tab="${hashTab}"]`)) {
  switchTab(hashTab);
}

init();

</script>
