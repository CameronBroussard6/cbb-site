<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>CTB Analytics — College Basketball Sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0d0f12;
  --surface:   #161920;
  --surface2:  #1e2229;
  --border:    #2a2f38;
  --text:      #e8eaf0;
  --muted:     #9097a3;
  --muted2:    #707784;

  /* CBB accent: rose/pink instead of green — visually distinct from NBA */
  --accent:    #f43f7a;
  --accent-d:  #4a1128;
  --accent-bg: #2a1120;

  /* Blue for card borders / over badge — kept from old CBB */
  --blue:      #3b82f6;
  --blue-d:    #1e3a5f;
  --blue-bg:   #0f1e35;

  --warn:      #f59e0b;
  --danger:    #ef4444;
  --gold:      #d4af37;
  --mono:      'IBM Plex Mono', monospace;
  --sans:      'IBM Plex Sans', sans-serif;
  --r:         8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

/* ── HEADER ── */
header {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}
.header-copy { min-width: 0; flex: 1 1 auto; }
.brand {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 2px;
}
.site-title {
  font-size: 22px;
  font-weight: 600;
  color: #ffffff;
  letter-spacing: -0.3px;
  line-height: 1.1;
}
.site-date {
  font-size: 12px;
  font-style: italic;
  color: #ffffff;
  margin-top: 4px;
}
#updated {
  font-size: 10px;
  font-style: normal;
  color: var(--muted);
  margin-top: 4px;
}
.header-logo {
  flex: 0 0 auto;
  width: 130px;
  height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.header-logo img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}

/* ── RECORD TRACKERS ── */
.records {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.rec {
  padding: 12px 16px;
  border-right: 1px solid var(--border);
  /* Blue left-accent stripe — CBB visual identity */
  border-left: 2px solid var(--blue);
}
.rec:first-child { border-left: 2px solid var(--blue); }
.rec:last-child { border-right: none; }
.rec-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 4px;
}
.rec-val {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}
.rec-sub {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted2);
  margin-top: 3px;
}
.rec-sub2 {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted2);
  margin-top: 1px;
}

/* ── TABS ── */
.tabs-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 12px 10px;
}
.tabs {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.tab {
  padding: 10px 14px;
  min-width: 120px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface2);
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  transition: 0.15s ease;
  user-select: none;
  text-align: center;
}
.tab:hover { color: var(--text); border-color: #3a404b; }
/* Rose/pink active — immediately different from NBA green */
.tab.active {
  color: #ffffff;
  border-color: var(--accent);
  background: var(--accent-bg);
  box-shadow: inset 0 0 0 1px rgba(244,63,122,0.15);
}
.tab-ct {
  display: inline-block;
  min-width: 22px;
  margin-left: 7px;
  padding: 2px 7px;
  border-radius: 999px;
  background: #2b313b;
  color: #c9d0db;
  font-size: 10px;
  font-family: var(--mono);
  vertical-align: middle;
}
.tab.active .tab-ct {
  background: var(--accent);
  color: #fff;
}

/* ── MAIN / PANELS ── */
main { padding: 14px; }
.panel { display: none; }
.panel.active { display: block; }

/* ── BET BADGES ── */
.badge {
  display: inline-flex;
  align-items: flex-start;
  gap: 6px;
  padding: 5px 8px 5px 7px;
  border-radius: 4px;
  font-family: var(--mono);
  line-height: 1.05;
  white-space: nowrap;
}
.b-over {
  background: var(--blue-bg);
  color: #93c5fd;
  border: 1px solid #1d4ed8;
}
.b-under {
  background: #1a0a0a;
  color: #fca5a5;
  border: 1px solid #7f1d1d;
}
.b-home {
  background: var(--accent-bg);
  color: #fda4c0;
  border: 1px solid #831843;
}
.b-away {
  background: #1a1500;
  color: #fde68a;
  border: 1px solid #78350f;
}
.b-pass {
  background: var(--surface2);
  color: var(--muted);
  border: 1px solid var(--border);
}
.badge-arrow { font-size: 13px; font-weight: 700; line-height: 1; padding-top: 1px; }
.badge-copy { display: flex; flex-direction: column; align-items: flex-start; gap: 1px; }
.badge-main { font-size: 10px; font-weight: 700; letter-spacing: 0.02em; }
.badge-sub  { font-size: 8px; opacity: 0.85; line-height: 1; }

/* ── SCORE STYLES ── */
.es { font-family: var(--mono); font-size: 13px; font-weight: 600; }
.ep { color: var(--blue); }
.en { color: #f87171; }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 50px 20px; color: var(--muted); }
.empty .icon { font-size: 28px; margin-bottom: 10px; }

/* ═══════════════════════════════════════════════════
   CBB GAME CARDS — compact, mobile-first
   Each card = one game's pick
═══════════════════════════════════════════════════ */
.game-cards { display: flex; flex-direction: column; gap: 10px; }

.game-card {
  background: var(--surface);
  /* Blue left border — CBB visual signature */
  border: 1px solid var(--border);
  border-left: 3px solid var(--blue);
  border-radius: var(--r);
  overflow: hidden;
}

/* Top strip: matchup + badge */
.gc-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
}
.gc-matchup { min-width: 0; flex: 1; }
.gc-rank {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted2);
  margin-bottom: 2px;
}
.gc-teams {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.gc-teams .away { color: var(--muted); font-weight: 500; }
.gc-teams .vs   { color: var(--muted2); font-size: 10px; margin: 0 4px; }

/* Body: 4-column stat grid */
.gc-body {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr;
  gap: 0;
}
.gc-cell {
  padding: 8px 10px;
  border-right: 1px solid var(--border);
  min-width: 0;
}
.gc-cell:last-child { border-right: none; }
.gc-cell-label {
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted2);
  margin-bottom: 4px;
  white-space: nowrap;
}
.gc-cell-value {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}
.gc-cell-value.dim { color: var(--muted); font-size: 11px; }

/* AG score color bar */
.ag-bar {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-top: 4px;
}
.ag-bar-track {
  height: 3px;
  border-radius: 2px;
  background: var(--border);
  flex: 1;
  overflow: hidden;
}
.ag-bar-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, #f43f7a, #fb923c);
}

/* Edge score coloring — same logic as NBA */
.es-high  { color: hsl(260, 85%, 72%); font-weight: 700; }
.es-med   { color: hsl(240, 85%, 70%); font-weight: 600; }
.es-low   { color: var(--muted); font-weight: 500; }

/* Model preds row — small secondary line under market */
.gc-pred {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
}
.gc-pred span { color: var(--text); }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  header { padding: 14px 14px 12px; }
  .header-logo { width: 88px; height: 88px; }
  .site-title { font-size: 18px; }
  main { padding: 10px; }
  .records { grid-template-columns: repeat(3, 1fr); }
  .rec { padding: 10px 8px; }
  .rec-val { font-size: 15px; }
  .tab { min-width: 100px; padding: 9px 10px; font-size: 12px; }
  .gc-body { grid-template-columns: 1fr 1fr 1fr 1fr; }
  .gc-cell { padding: 7px 8px; }
  .gc-cell-value { font-size: 11px; }
}

@media (max-width: 400px) {
  .gc-body { grid-template-columns: 1fr 1fr; }
  .gc-cell:nth-child(2) { border-right: none; }
  .gc-cell:nth-child(4) { border-right: none; }
  .gc-cell:nth-child(3),
  .gc-cell:nth-child(4) { border-top: 1px solid var(--border); }
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-copy">
      <div class="brand">CTB Analytics</div>
      <div class="site-title">College Basketball Sheet</div>
      <div class="site-date" id="run-date">—</div>
      <div id="updated">Last Run: —</div>
    </div>
    <div class="header-logo">
      <img src="assets/ctb-logo.png" alt="CTB Analytics Logo">
    </div>
  </div>
</header>

<!-- Record trackers: Game Totals | Team Totals | Spreads -->
<div class="records">
  <div class="rec">
    <div class="rec-label">Game Totals</div>
    <div class="rec-val" id="r-gt">—</div>
    <div class="rec-sub" id="r-gt-pct">—</div>
    <div class="rec-sub2" id="r-gt-top10">—</div>
  </div>
  <div class="rec">
    <div class="rec-label">Team Totals</div>
    <div class="rec-val" id="r-tt">—</div>
    <div class="rec-sub" id="r-tt-pct">—</div>
    <div class="rec-sub2" id="r-tt-top10">—</div>
  </div>
  <div class="rec">
    <div class="rec-label">Spreads</div>
    <div class="rec-val" id="r-sp">—</div>
    <div class="rec-sub" id="r-sp-pct">—</div>
    <div class="rec-sub2" id="r-sp-top10">—</div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs-wrap">
  <div class="tabs">
    <div class="tab active" data-tab="gt">Game Totals <span class="tab-ct" id="ct-gt">0</span></div>
    <div class="tab" data-tab="tt">Team Totals <span class="tab-ct" id="ct-tt">0</span></div>
    <div class="tab" data-tab="sp">Spreads <span class="tab-ct" id="ct-sp">0</span></div>
  </div>
</div>

<main>
  <div class="panel active" id="panel-gt"></div>
  <div class="panel" id="panel-tt"></div>
  <div class="panel" id="panel-sp"></div>
</main>

<script>
// ── CONFIG ─────────────────────────────────────────────────────────────────
const GITHUB_USER = 'CameronBroussard6';
const GITHUB_REPO = 'cbb-site';
const BASE = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main`;

// Tabs and their CSV file prefixes / display labels
const TABS = {
  gt: { label: 'Game Totals',  file: 'brain_game_totals',  histFile: 'game_totals_history' },
  tt: { label: 'Team Totals',  file: 'brain_team_totals',  histFile: 'team_totals_history' },
  sp: { label: 'Spreads',      file: 'brain_spreads',      histFile: 'spreads_history'     },
};

// Which CSV columns are the model prediction columns (used to compute AG score)
// These are the columns that vote for over/under — adjust to match your actual brain CSV columns
const MODEL_COLS = {
  gt: ['ridge_pred_total', 'recency_pred_total', 'ensemble_pred_total'],
  tt: ['pred_team_total'],
  sp: ['model_spread_str'],
};

// ── UTILS ──────────────────────────────────────────────────────────────────
function today() { return new Date().toISOString().slice(0, 10); }

function ordinal(n) {
  const s = ['th','st','nd','rd'], v = n % 100;
  return n + (s[(v-20)%10] || s[v] || s[0]);
}

function fmtDateOrdinal(str) {
  if (!str) return '—';
  const d = new Date(str + 'T12:00:00');
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  return `${days[d.getDay()]}, ${months[d.getMonth()]} ${ordinal(d.getDate())} ${d.getFullYear()}`;
}

function fmtLastRun(isoStr) {
  if (!isoStr) return 'Last Run: —';
  const d = new Date(isoStr);
  if (isNaN(d.getTime())) return 'Last Run: —';
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: 'America/Chicago',
    month: 'long', day: 'numeric', year: 'numeric',
    hour: 'numeric', minute: '2-digit', hour12: true
  }).formatToParts(d);
  const get = t => parts.find(p => p.type === t)?.value || '';
  const day = Number(get('day'));
  return `Last Run: ${get('month')} ${ordinal(day)} ${get('year')} ${get('hour')}:${get('minute')} ${(get('dayPeriod')||'').toLowerCase()} Central`;
}

async function fetchCSV(url) {
  try {
    const r = await fetch(url + '?t=' + Date.now());
    if (!r.ok) return null;
    return parseCSV(await r.text());
  } catch(e) { return null; }
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const vals = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      if (line[i] === '"') { inQ = !inQ; continue; }
      if (line[i] === ',' && !inQ) { vals.push(cur); cur = ''; continue; }
      cur += line[i];
    }
    vals.push(cur);
    const obj = {};
    headers.forEach((h, i) => obj[h] = (vals[i]||'').trim());
    return obj;
  });
}

function fmt(v, d=1) {
  const n = parseFloat(v);
  return isNaN(n) ? '—' : n.toFixed(d);
}

function fmtRec(w, l) { return (w+l===0) ? '—' : `${w}-${l}`; }
function pct(w, l)     { return (w+l===0) ? '—' : `${Math.round(w/(w+l)*100)}%`; }

// ── AG SCORE ───────────────────────────────────────────────────────────────
// Computed from model prediction columns vs the market line and bet direction
// For game totals: count how many model preds agree with bet direction (OVER/UNDER)
// For spreads: how many models agree with the spread pick
function computeAGScore(row, tabKey) {
  const bet = (row.bet || row.pick || '').toUpperCase();
  if (!bet || bet === '' || bet === 'PASS') return null;

  const cols = MODEL_COLS[tabKey] || [];
  if (cols.length === 0) return null;

  let market, agrees = 0, total = 0;

  if (tabKey === 'gt' || tabKey === 'tt') {
    market = parseFloat(row.market_total || row.market_team_total || 0);
    if (isNaN(market)) return null;
    cols.forEach(col => {
      const pred = parseFloat(row[col]);
      if (isNaN(pred)) return;
      total++;
      const predSide = pred > market ? 'OVER' : 'UNDER';
      if (predSide === bet) agrees++;
    });
  } else if (tabKey === 'sp') {
    // For spreads, use edge_pts as proxy — if positive, models lean to pick
    // If only one spread model, AG is just 0 or 1
    const edge = parseFloat(row.edge_pts || 0);
    return isNaN(edge) ? null : Math.min(1, Math.abs(edge) / 10);
  }

  return total === 0 ? null : agrees / total;
}

function agScoreStyle(score) {
  if (score === null || isNaN(score)) return 'color:#707784;font-weight:500;';
  const hue = score * 120; // 0=red, 120=green
  return `color:hsl(${hue},55%,62%);font-weight:700;`;
}

function agScoreDisplay(score) {
  if (score === null || isNaN(score)) return '—';
  return `${Math.round(score * 100)}%`;
}

function agBarFill(score) {
  if (score === null || isNaN(score)) return 0;
  return Math.round(score * 100);
}

// ── EDGE SCORE STYLE ───────────────────────────────────────────────────────
function edgeScoreClass(score) {
  const n = parseFloat(score);
  if (isNaN(n)) return '';
  if (n >= 8) return 'es-high';
  if (n >= 4) return 'es-med';
  return 'es-low';
}

// ── BET BADGE ──────────────────────────────────────────────────────────────
function betBadge(row, tabKey) {
  const raw = (row.bet || row.pick || '').toUpperCase();

  if (tabKey === 'gt' || tabKey === 'tt') {
    const line = fmt(row.market_total || row.market_team_total, 1);
    if (raw === 'OVER') return `<span class="badge b-over"><span class="badge-arrow">↑</span><span class="badge-copy"><span class="badge-main">Over ${line}</span></span></span>`;
    if (raw === 'UNDER') return `<span class="badge b-under"><span class="badge-arrow">↓</span><span class="badge-copy"><span class="badge-main">Under ${line}</span></span></span>`;
  }

  if (tabKey === 'sp') {
    const mkt = row.market_spread_str || '—';
    if (raw && raw !== '') {
      const isHome = raw === (row.home_team||'').toUpperCase() || raw.includes('HOME');
      const cls = isHome ? 'b-home' : 'b-away';
      const arrow = isHome ? '⌂' : '✈';
      return `<span class="badge ${cls}"><span class="badge-arrow">${arrow}</span><span class="badge-copy"><span class="badge-main">${row.pick || row.bet}</span><span class="badge-sub">${mkt}</span></span></span>`;
    }
  }

  return `<span class="badge b-pass">PASS</span>`;
}

// ── RECORD COMPUTATION ─────────────────────────────────────────────────────
function computeRecord(rows, resultCol, topN = null) {
  if (!rows || !rows.length) return { w: 0, l: 0, p: 0 };
  let sorted = rows;
  if (topN) {
    sorted = rows.slice().sort((a,b) => parseFloat(b.brain_score||0) - parseFloat(a.brain_score||0)).slice(0, topN);
  }
  let w=0, l=0, p=0;
  sorted.forEach(r => {
    const res = (r[resultCol]||'').toUpperCase();
    if (res==='W') w++;
    else if (res==='L') l++;
    else if (res==='P') p++;
  });
  return { w, l, p };
}

async function loadRecords() {
  const configs = [
    { id: 'gt', histFile: 'game_totals_history', resultCol: 'bet_result' },
    { id: 'tt', histFile: 'team_totals_history',  resultCol: 'bet_result' },
    { id: 'sp', histFile: 'spreads_history',       resultCol: 'pick_result' },
  ];

  for (const cfg of configs) {
    const rows = await fetchCSV(`${BASE}/data/${cfg.histFile}.csv`);
    if (!rows || !rows.length) continue;

    const all   = computeRecord(rows, cfg.resultCol);
    const top10 = computeRecord(rows, cfg.resultCol, 10);

    document.getElementById(`r-${cfg.id}`).textContent     = fmtRec(all.w, all.l);
    document.getElementById(`r-${cfg.id}-pct`).textContent = pct(all.w, all.l);
    document.getElementById(`r-${cfg.id}-top10`).textContent = `Top10: ${fmtRec(top10.w, top10.l)} ${pct(top10.w, top10.l)}`;
  }
}

// ── CARD BUILDER ───────────────────────────────────────────────────────────
function buildCards(rows, tabKey) {
  if (!rows || !rows.length) {
    const label = TABS[tabKey]?.label || tabKey;
    return `<div class="empty"><div class="icon">🏀</div><p>No ${label} picks for today.</p></div>`;
  }

  const sorted = rows.slice().sort((a,b) => parseFloat(b.brain_score||0) - parseFloat(a.brain_score||0));

  return `<div class="game-cards">${sorted.map((r, i) => buildCard(r, i, tabKey)).join('')}</div>`;
}

function buildCard(r, rank, tabKey) {
  const ag = computeAGScore(r, tabKey);
  const agPct = agBarFill(ag);
  const edgeClass = edgeScoreClass(r.brain_score);
  const badge = betBadge(r, tabKey);

  // Matchup line
  const away = r.away_team || '?';
  const home = r.home_team || r.team_name || '?';
  const matchup = tabKey === 'tt'
    ? `<span class="${r.homeAway==='home'?'':'away'}">${home}</span> <span class="vs">${r.homeAway==='home'?'(H)':'(A)'}</span>`
    : `<span class="away">${away}</span><span class="vs"> @ </span>${home}`;

  // Market + model lines
  let marketLine = '—', modelLine = '—', edgePts = '—';

  if (tabKey === 'gt') {
    marketLine = fmt(r.market_total, 1);
    modelLine  = fmt(r.ensemble_pred_total || r.ridge_pred_total, 1);
    edgePts    = (() => {
      const diff = parseFloat(r.ensemble_pred_total || r.ridge_pred_total) - parseFloat(r.market_total);
      return isNaN(diff) ? '—' : (diff >= 0 ? '+' : '') + diff.toFixed(1);
    })();
  } else if (tabKey === 'tt') {
    marketLine = fmt(r.market_team_total, 1);
    modelLine  = fmt(r.pred_team_total, 1);
    edgePts    = (() => {
      const diff = parseFloat(r.pred_team_total) - parseFloat(r.market_team_total);
      return isNaN(diff) ? '—' : (diff >= 0 ? '+' : '') + diff.toFixed(1);
    })();
  } else if (tabKey === 'sp') {
    marketLine = r.market_spread_str || '—';
    modelLine  = r.model_spread_str  || '—';
    edgePts    = r.edge_pts ? (parseFloat(r.edge_pts) >= 0 ? '+' : '') + fmt(r.edge_pts, 1) : '—';
  }

  const edgePtClass = edgePts.startsWith('+') ? 'ep' : edgePts.startsWith('-') ? 'en' : '';

  return `
<div class="game-card">
  <div class="gc-head">
    <div class="gc-matchup">
      <div class="gc-rank">#${rank+1}</div>
      <div class="gc-teams">${matchup}</div>
    </div>
    <div>${badge}</div>
  </div>
  <div class="gc-body">
    <div class="gc-cell">
      <div class="gc-cell-label">Edge Score</div>
      <div class="gc-cell-value es ${edgeClass}">${fmt(r.brain_score, 1)}</div>
    </div>
    <div class="gc-cell">
      <div class="gc-cell-label">AG Score</div>
      <div class="gc-cell-value es" style="${agScoreStyle(ag)}">${agScoreDisplay(ag)}</div>
      <div class="ag-bar"><div class="ag-bar-track"><div class="ag-bar-fill" style="width:${agPct}%"></div></div></div>
    </div>
    <div class="gc-cell">
      <div class="gc-cell-label">Market</div>
      <div class="gc-cell-value">${marketLine}</div>
      <div class="gc-pred">Model: <span>${modelLine}</span></div>
    </div>
    <div class="gc-cell">
      <div class="gc-cell-label">Edge</div>
      <div class="gc-cell-value ${edgePtClass}">${edgePts}</div>
    </div>
  </div>
</div>`;
}

// ── INIT ───────────────────────────────────────────────────────────────────
async function init() {
  const dateStr = today();
  document.getElementById('run-date').textContent = fmtDateOrdinal(dateStr);

  // Try to get last-run timestamp from meta.json written by pipeline
  const meta = await fetch(`${BASE}/meta.json?t=` + Date.now())
    .then(r => r.ok ? r.json() : null).catch(() => null);
  if (meta && meta.run_timestamp) {
    document.getElementById('updated').textContent = fmtLastRun(meta.run_timestamp);
  }

  let sawData = false;

  for (const [tabKey, cfg] of Object.entries(TABS)) {
    const panel = document.getElementById(`panel-${tabKey}`);
    panel.innerHTML = `<div class="empty"><div class="icon">⟳</div><p>Loading…</p></div>`;

    // Try today, fall back to yesterday
    let rows = await fetchCSV(`${BASE}/data/${cfg.file}_${dateStr}.csv`);
    if (!rows || !rows.length) {
      const yd = new Date(Date.now() - 86400000).toISOString().slice(0,10);
      rows = await fetchCSV(`${BASE}/data/${cfg.file}_${yd}.csv`);
    }

    if (rows && rows.length) {
      sawData = true;
      document.getElementById(`ct-${tabKey}`).textContent = String(rows.length);
      panel.innerHTML = buildCards(rows, tabKey);
    } else {
      document.getElementById(`ct-${tabKey}`).textContent = '0';
      panel.innerHTML = `<div class="empty"><div class="icon">📭</div><p>No ${cfg.label} data yet.</p></div>`;
    }
  }

  // If no meta.json, fall back to now if we saw data
  if (!meta && sawData) {
    document.getElementById('updated').textContent = fmtLastRun(new Date().toISOString());
  }

  // Load W-L records from history CSVs
  loadRecords();
}

// ── TAB SWITCHING ──────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(`panel-${t.dataset.tab}`).classList.add('active');
  });
});

init();
</script>
</body>
</html>
